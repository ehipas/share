  hdrSub:"协作体验 · 案例研究",
  ht:"案例研究 · 协作体验",
  hh:"年度手工艺与<br><b>民俗文化集市</b>",
  hl:"一个体验。77个府。每府超过1,000位共同创作者——从全国品牌和佛教寺院，到土著工匠和国家公园护林员。这就是Ehipas协作体验的规模。",

  ha_l:"真实性标准",

  s_event:"体验",

  ep2:"每个府举办具有当地传统特色的集市。北部府以兰纳纺织品和山地部落银器为特色。东北部府突出<em>摩兰</em>音乐和丝绸织造。南部府展示蜡染和海鲜文化。同一平台，每个府有不同的灵魂。",

  {color:"#4af7c9",n:{en:"Indigenous & Ethnic Communities",th:"ชนพื้นเมืองและชาติพันธุ์",zh:"土著与少数民族社区",ru:"Коренные общины"},cnt:10,
   d:{en:"Hill tribes in the North (Hmong, Karen, Akha, Lisu), Malay-Muslim communities in the South, Mon and Khmer heritage groups in the East. Their crafts command premium prices from collectors.",
      th:"ชาวเขาภาคเหนือ (ม้ง กะเหรี่ยง อาข่า ลีซู) ชุมชนมลายู-มุสลิมภาคใต้ กลุ่มมอญและเขมร",
      zh:"北部山地部落(苗族、克伦族、阿卡族、傈僳族)、南部马来穆斯林社区、东部孟族和高棉文化遗产群体。他们的手工艺深受收藏家追捧。",
      ru:"Горные племена севера (хмонг, карен, акха, лису), малайско-мусульманские общины юга, народы мон и кхмер востока."},
   l:{en:["Northern hill tribe silver & textiles","Southern batik & Malay weaving","Khmer & Mon cultural artifacts","Indigenous food traditions","Traditional healing ceremonies","Ethnic music & dance performance"],
      th:["เครื่องเงินและผ้าทอชาวเขา","บาติกภาคใต้และการทอผ้ามลายู","โบราณวัตถุเขมรและมอญ","อาหารพื้นเมืองดั้งเดิม","พิธีกรรมการรักษาแบบดั้งเดิม","ดนตรีและการฟ้อนรำชาติพันธุ์"],
      zh:["北部山地部落银饰与纺织品","南部蜡染与马来编织","高棉与孟族文化器物","土著食物传统","传统治愈仪式","民族音乐与舞蹈表演"],
      ru:["Серебро и ткани горных племён","Батик и малайское ткачество","Артефакты кхмер и мон","Традиционная кухня","Ритуалы целительства","Этническая музыка и танцы"]}}
];// === STATE ===
let lang='en';
let themePref='system';
const P={res:100,mult:1.6,spec:15,prov:77,food:300,craft:400,other:200,days:3};

// === THEME ===
const TICONS={system:'⊙',light:'☀',dark:'☾'};
function resolveTheme(t){
  if(t==='system') return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  return t;
}
function applyTheme(t){
  themePref=t;
  document.body.setAttribute('data-theme',resolveTheme(t));
  document.getElementById('ticon').textContent=TICONS[t]||'⊙';
  ['sys','light','dark'].forEach(k=>{
    const el=document.getElementById('tc-'+k);
    if(el) el.textContent=(k===t||(k==='sys'&&t==='system'))?'✓':'';
  });
  const tt=T[lang]||T.en;
  const s=document.getElementById('ts-sys'),l=document.getElementById('ts-lt'),d=document.getElementById('ts-dk');
  if(s) s.textContent=tt.ts_sys;
  if(l) l.textContent=tt.ts_lt;
  if(d) d.textContent=tt.ts_dk;
}
function setTheme(t){
  localStorage.setItem('ehipas-theme',t);
  closeDD();
  applyTheme(t);
}
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{
  if(themePref==='system') applyTheme('system');
});

// === DROPDOWN ===
let openDD=null;
function togDD(id){
  const m=document.getElementById(id+'-dd');
  const ov=document.getElementById('ov');
  if(openDD===id){closeDD();return;}
  closeDD();
  m.classList.add('open');
  ov.classList.add('on');
  openDD=id;
}
function closeDD(){
  document.querySelectorAll('.ddmenu').forEach(m=>m.classList.remove('open'));
  const ov=document.getElementById('ov');
  if(ov) ov.classList.remove('on');
  openDD=null;
}

// === LANG ===
function applyLang(){
  const tt=T[lang]||T.en;
  const ids=['hdrSub','ht','hh','hl','s_concept','cp1','cp2','ha_l','ha_t',
    's_event','ep1','ep2','su1','sl1','su2','sl2','su3','sl3','su4','sl4',
    's_cr','cr_intro','cgt_l','s_venue','vp1','vp2',
    'fl1t','fl1d','fl2t','fl2d','fl3t','fl3d','fl4t','fl4d','hr_l','hr_t',
    's_c1','c1_intro','c1_title','p_res','p_mult','p_spec','p_prov',
    's_c2','c2_intro','c2_title','p_food','p_craft','p_other','p_days',
    's_prov','pv_l','s_eff','eff_intro','s_why','why_p',
    'w1t','w1d','w2t','w2d','w3t','w3d','w4t','w4d','w5t','w5d','w6t','w6d',
    'ths_l','ths_t'];
  ids.forEach(k=>{
    const el=document.getElementById(k);
    if(el && tt[k]!==undefined) el.innerHTML=tt[k];
  });
  document.getElementById('ll').textContent={en:'EN',th:'TH',zh:'中',ru:'RU'}[lang]||'EN';
  document.documentElement.lang=lang;
  ['en','th','zh','ru'].forEach(l=>{
    const ck=document.getElementById('lc-'+l);
    if(ck) ck.textContent=l===lang?'✓':'';
    const di=document.querySelector('[data-l="'+l+'"]');
    if(di) di.classList.toggle('on',l===lang);
  });
  const s=document.getElementById('ts-sys'),l2=document.getElementById('ts-lt'),d=document.getElementById('ts-dk');
  if(s) s.textContent=tt.ts_sys;
  if(l2) l2.textContent=tt.ts_lt;
  if(d) d.textContent=tt.ts_dk;
  updateDate();
  buildCG();
  buildEffects();
  calcRender();
}
function setLang(l){
  lang=l;
  localStorage.setItem('ehipas-lang',l);
  closeDD();
  applyLang();
}

// === DATE ===
function updateDate(){
  const now=new Date();
  let s;
  if(lang==='th'){
    const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    s=now.getDate()+' '+m[now.getMonth()]+' '+(now.getFullYear()+543);
  } else if(lang==='ru'){
    s=now.toLocaleDateString('ru-RU',{year:'numeric',month:'long',day:'numeric'});
  } else if(lang==='zh'){
    s=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
  } else {
    s=now.toLocaleDateString('en-GB',{year:'numeric',month:'short',day:'numeric'});
  }
  const el=document.getElementById('ds');
  if(el) el.textContent=s;
}

// === CREATOR GROUPS ===
function buildCG(){
  const grid=document.getElementById('cgGrid');
  if(!grid) return;
  grid.innerHTML=CG.map((g,i)=>`
    <div class="cgi" id="cg${i}" onclick="togCG(${i})">
      <div class="cgh">
        <span class="cgd" style="background:${g.color}"></span>
        <span class="cgn">${g.n[lang]||g.n.en}</span>
        <span class="cgc">~${g.cnt}</span>
        <span class="cga">›</span>
      </div>
      <div class="cgb">
        <p style="margin:8px 0 4px">${g.d[lang]||g.d.en}</p>
        <ul>${(g.l[lang]||g.l.en).map(x=>'<li>'+x+'</li>').join('')}</ul>
      </div>
    </div>`).join('');
  const tot=CG.reduce((s,g)=>s+g.cnt,0);
  const tv=document.getElementById('cgt_v');
  if(tv) tv.textContent=tot.toLocaleString();
}
function togCG(i){
  const el=document.getElementById('cg'+i);
  const was=el.classList.contains('open');
  document.querySelectorAll('.cgi').forEach(e=>e.classList.remove('open'));
  if(!was) el.classList.add('open');
}

// === PROVINCE DOTS ===
function buildDots(){
  const wrap=document.getElementById('pdots');
  if(!wrap) return;
  wrap.innerHTML='';
  for(let i=0;i<77;i++){
    const d=document.createElement('div');
    d.className='dot on';
    d.title='Province '+(i+1);
    d.onclick=()=>{
      d.classList.toggle('on');
      P.prov=document.querySelectorAll('.dot.on').length;
      document.getElementById('v-prov').textContent=P.prov;
      calcRender();
    };
    wrap.appendChild(d);
  }
}

// === FORMAT HELPERS (USD only) ===
const toUSD=thb=>thb/36;
const fmtUSD=n=>{
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+Math.round(n).toLocaleString();
};
const fmtTHB=n=>{
  if(n>=1e9) return '฿'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return '฿'+(n/1e6).toFixed(1)+'M';
  if(n>=1e3) return '฿'+(n/1e3).toFixed(0)+'K';
  return '฿'+Math.round(n).toLocaleString();
};

// === CALCULATORS ===
function upd(k,raw){
  const v=parseFloat(raw);
  const disp={
    res:'฿'+v,
    mult:'×'+(v/10).toFixed(1),
    spec:v+'%',
    prov:Math.round(v),
    food:'฿'+v,
    craft:'฿'+v,
    other:'฿'+v,
    days:Math.round(v)
  };
  const el=document.getElementById('v-'+k);
  if(el) el.textContent=disp[k];
  if(k==='mult') P.mult=v/10;
  else P[k]=v;
  calcRender();
}

function calcRender(){
  const tt=T[lang]||T.en;

  // ── CALC 1: Ticket revenue ──
  const N=10000, fee=0.10, roy=0.05, rp=0.15;
  const pAvg=P.res*P.mult;

  // Primary market
  const primPlat=N*pAvg*fee;       // platform fee on primary
  const primCreator=N*pAvg*(1-fee); // creator income on primary

  // Secondary market (2 resale rounds, speculators only)
  const nSpec=Math.round(N*P.spec/100);
  let secPlat=0, secRoy=0, price2=pAvg;
  for(let r=0;r<2;r++){
    price2*=(1+rp);
    secPlat+=nSpec*price2*fee;
    secRoy +=nSpec*price2*roy;
  }

  // Totals per province & all provinces
  const exchPerProv =primPlat+secPlat;         // exchange (platform) revenue
  const exchAllTHB  =exchPerProv*P.prov;
  const exchAllUSD  =toUSD(exchAllTHB);

  const creatPerProv=primCreator+secRoy;
  const m1=Math.max(primPlat,secPlat,secRoy)||1;

  // Full trading volume (primary + secondary)
  const primVolTHB  = N * pAvg * P.prov;
  let   secVolTHB   = 0, pv2 = pAvg;
  for(let r=0;r<2;r++){pv2*=(1+rp); secVolTHB+=nSpec*pv2*P.prov;}
  const totalVolTHB = primVolTHB + secVolTHB;
  const totalVolUSD = toUSD(totalVolTHB);

  // Headline 1
  const rg1=document.getElementById('rg1');
  if(rg1) rg1.innerHTML=`
    <div class="rc" style="grid-column:1/-1;background:var(--acc-dim);border-color:var(--acc-brd)">
      <div class="rl" style="color:var(--acc)">${tt.cl_vol_headline||'Trading volume · all provinces'}</div>
      <div class="rv a" style="font-size:22px">${fmtUSD(totalVolUSD)}</div>
      <div class="rs">${fmtTHB(totalVolTHB)} · ${tt.cl_platform_fee} ${fmtUSD(toUSD(exchAllTHB))}</div>
    </div>`;

  const bk1=document.getElementById('bk1');
  if(bk1) bk1.innerHTML=`
    <div class="br"><div class="bl">${tt.cl_prim}</div><div class="bw"><div class="bb" style="width:${primPlat/m1*100}%;background:var(--acc)"></div></div><div class="bv">${fmtUSD(toUSD(primPlat))}</div></div>
    <div class="br"><div class="bl">${tt.cl_sec}</div><div class="bw"><div class="bb" style="width:${secPlat/m1*100}%;background:var(--teal)"></div></div><div class="bv">${fmtUSD(toUSD(secPlat))}</div></div>
    <div class="br"><div class="bl">${tt.cl_roy}</div><div class="bw"><div class="bb" style="width:${secRoy/m1*100}%;background:var(--violet)"></div></div><div class="bv">${fmtUSD(toUSD(secRoy))}</div></div>`;

  // ── CALC 2: In-fair economy ──
  const foodTot =P.food*P.days*N;
  const craftTot=P.craft*N;
  const otherTot=P.other*N;
  const infairPerProv=foodTot+craftTot+otherTot;
  const infairAllTHB =infairPerProv*P.prov;
  const indirectTHB  =infairAllTHB*1.8;
  const econAllUSD   =toUSD(indirectTHB);  // economic effect incl. multiplier
  const m2=Math.max(foodTot,craftTot,otherTot)||1;

  // Headline 2
  const rg2=document.getElementById('rg2');
  if(rg2) rg2.innerHTML=`
    <div class="rc" style="grid-column:1/-1;background:var(--amber-dim);border-color:rgba(247,183,74,.35)">
      <div class="rl" style="color:var(--amber)">${tt.cl_econ_headline||'Economic effect · all provinces · ×1.8'}</div>
      <div class="rv" style="font-size:22px;color:var(--amber)">${fmtUSD(econAllUSD)}</div>
      <div class="rs">${fmtTHB(indirectTHB)} · ${tt.cl_direct} ${fmtUSD(toUSD(infairAllTHB))}</div>
    </div>`;

  const bk2=document.getElementById('bk2');
  if(bk2) bk2.innerHTML=`
    <div class="br"><div class="bl">${tt.cl_food}</div><div class="bw"><div class="bb" style="width:${foodTot/m2*100}%;background:var(--amber)"></div></div><div class="bv">${fmtUSD(toUSD(foodTot))}</div></div>
    <div class="br"><div class="bl">${tt.cl_cra}</div><div class="bw"><div class="bb" style="width:${craftTot/m2*100}%;background:var(--acc)"></div></div><div class="bv">${fmtUSD(toUSD(craftTot))}</div></div>
    <div class="br"><div class="bl">${tt.cl_oth}</div><div class="bw"><div class="bb" style="width:${otherTot/m2*100}%;background:var(--blue)"></div></div><div class="bv">${fmtUSD(toUSD(otherTot))}</div></div>`;
}

// === EFFECTS ===
function buildEffects(){
  const tt=T[lang]||T.en;
  const div=document.getElementById('tlDiv');
  if(!div) return;
  div.innerHTML=(tt.ef||T.en.ef).map((ef,i)=>`
    <div class="tlc" id="tl${i}">
      <div class="tlh" onclick="togTL(${i})">
        <span class="tld" style="background:${ef.color}"></span>
        <span class="tln">${ef.title}</span>
        <span class="tlb2" style="background:rgba(128,128,128,.1);color:${ef.color};border:1px solid ${ef.color}55">${ef.badge}</span>
        <span class="tla">›</span>
      </div>
      <div class="tlbd">
        <div class="tli">${ef.items.map(it=>`
          <div class="ti">
            <div class="tit">${it[0]}</div>
            <div class="tid">${it[1]}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`).join('');
}
function togTL(i){
  const el=document.getElementById('tl'+i);
  const was=el.classList.contains('open');
  document.querySelectorAll('.tlc').forEach(e=>e.classList.remove('open'));
  if(!was) el.classList.add('open');
}

// === FADE-IN OBSERVER ===
const obs=new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting) e.target.classList.add('v');});
},{threshold:0.07});
document.querySelectorAll('.fi').forEach(el=>obs.observe(el));

// === INIT ===
(function(){
  const savedLang=localStorage.getItem('ehipas-lang')||'en';
  const savedTheme=localStorage.getItem('ehipas-theme')||'system';
  lang=savedLang;
  buildDots();
  applyTheme(savedTheme);
  applyLang();
})();
</script>
