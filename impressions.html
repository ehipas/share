<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ehipas — Витрина впечатлений</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Thai:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mono:'DM Mono',monospace;
  --sans:'DM Sans','Noto Sans Thai','Noto Sans SC',sans-serif;
  --r:10px;--rs:6px;
  --cat-adapt:#f7b74a;--cat-exotic:#f74a4a;
  --cat-buddhism:#9b7ef7;--cat-culture:#4af7c9;
  --diff-low:#4af7c9;--diff-med:#f7b74a;--diff-high:#f74a4a;
}
[data-theme="dark"]{
  --bg:#0d0d0b;--bg2:#141412;--bg3:#1c1c19;
  --bd:#2a2a26;--bd2:#3a3a36;
  --tx:#e8e6dc;--tx2:#88887e;--tx3:#555550;
  --crd:#141412;--inp:#1c1c19;
  --acc:#b8f73a;--acc-btn:#b8f73a;--acc-btn-tx:#0d0d0b;
  --acc-dim:rgba(184,247,58,.09);--acc-brd:rgba(184,247,58,.35);
  --shd:0 2px 16px rgba(0,0,0,.55);
  --fbg:rgba(184,247,58,.09);--fbrd:rgba(184,247,58,.38);
}
[data-theme="light"]{
  --bg:#f4f3ee;--bg2:#fff;--bg3:#eceae2;
  --bd:#dbd9d0;--bd2:#c8c5bc;
  --tx:#1a1a17;--tx2:#5c5c58;--tx3:#99998f;
  --crd:#fff;--inp:#eceae2;
  --acc:#2e7d0e;--acc-btn:#5cb82a;--acc-btn-tx:#fff;
  --acc-dim:rgba(46,125,14,.07);--acc-brd:rgba(46,125,14,.30);
  --shd:0 2px 16px rgba(0,0,0,.09);
  --fbg:rgba(46,125,14,.07);--fbrd:rgba(46,125,14,.32);
}
html,body{width:100%;overflow-x:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;transition:background .2s,color .2s}

/* HEADER */
.hdr{border-bottom:1px solid var(--bd);padding:11px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;background:var(--bg)}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.1em;color:var(--acc);text-transform:uppercase;flex-shrink:0}
.hdr-title{font-size:11px;color:var(--tx3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-ctrls{display:flex;gap:5px;align-items:center;flex-shrink:0}
.sw{flex:1;max-width:300px;min-width:0;position:relative}
.sw input{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:var(--sans);font-size:12px;padding:5px 8px 5px 26px;outline:none;transition:border-color .15s}
.sw input:focus{border-color:var(--bd2)}
.sw input::placeholder{color:var(--tx3)}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--tx3);pointer-events:none}

/* DROPDOWN */
.ddwrap{position:relative;display:inline-block}
.ddtrig{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx2);font-family:var(--mono);font-size:11px;padding:5px 8px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:border-color .15s,color .15s}
.ddtrig:hover{border-color:var(--bd2);color:var(--tx)}
.ddarrow{font-size:9px;opacity:.5}
.ddmenu{display:none;position:absolute;right:0;top:calc(100% + 4px);background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rs);min-width:152px;box-shadow:var(--shd);z-index:300;overflow:hidden}
.ddmenu.open{display:block}
.ddi{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:12px;color:var(--tx2);cursor:pointer;transition:background .1s;border-bottom:1px solid var(--bd)}
.ddi:last-child{border-bottom:none}
.ddi:hover{background:var(--bg3);color:var(--tx)}
.ddi.on{color:var(--acc)}
.ddi-ic{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.ddi-lb{flex:1}
.ddi-ck{font-size:10px;color:var(--acc);margin-left:auto;width:12px;text-align:center}
.overlay{display:none;position:fixed;inset:0;z-index:99}
.overlay.on{display:block}

/* LAYOUT */
.wrap{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 45px);align-items:start}
@media(max-width:767px){.wrap{grid-template-columns:1fr}}

/* SIDEBAR */
.sb{border-right:1px solid var(--bd);padding:16px 13px;background:var(--bg)}
@media(min-width:768px){
  .sb{position:sticky;top:45px;height:calc(100vh - 45px);overflow-y:auto}
  .sb::-webkit-scrollbar{width:3px}
  .sb::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
}
@media(max-width:767px){.sb{border-right:none;border-bottom:1px solid var(--bd)}}
.slbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.ssec{margin-bottom:20px}
.cbadge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--tx2);margin-bottom:16px}
.cnum{color:var(--acc);font-size:14px;font-weight:500}

/* FILTER CHIPS */
.fchips,.dchips{display:flex;flex-direction:column;gap:4px}
@media(max-width:767px){.fchips,.dchips{flex-direction:row;flex-wrap:wrap}}
.fc,.dc{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--rs);cursor:pointer;transition:border-color .15s,background .15s;background:var(--inp);user-select:none}
.dc{padding:6px 9px}
.fc:hover,.dc:hover{border-color:var(--bd2)}
.fc.active,.dc.active{border-color:var(--acc-brd);background:var(--acc-dim)}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fl{font-size:11px;line-height:1.3;flex:1}
.fn{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-left:auto}
.fc.active .fn,.dc.active .fn{color:var(--acc)}
.ftog{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--rs);cursor:pointer;transition:border-color .15s,background .15s;background:var(--inp);user-select:none;font-size:11px}
.ftog:hover{border-color:var(--bd2)}
.ftog.active{border-color:var(--fbrd);background:var(--fbg)}
.ftog .star{color:var(--acc);font-size:12px}
.rbtn{width:100%;padding:7px;background:transparent;color:var(--tx3);border:1px solid var(--bd);border-radius:var(--rs);font-size:11px;font-family:var(--mono);cursor:pointer;transition:color .15s,border-color .15s;margin-top:6px;letter-spacing:.05em}
.rbtn:hover{color:var(--tx2);border-color:var(--bd2)}

/* MAIN */
.main{padding:18px 14px;min-width:0;overflow:hidden}
@media(min-width:768px){.main{padding:20px 22px}}
.nores{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:30vh;color:var(--tx3);text-align:center;gap:10px}
.nores.show{display:flex}
.nores-ic{font-family:var(--mono);font-size:24px;color:var(--bd2)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
@media(max-width:480px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--crd);border:1px solid var(--bd);border-radius:var(--r);border-left-width:3px;padding:13px 14px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s,box-shadow .2s,transform .15s;cursor:pointer;animation:fi .22s ease both;overflow:hidden}
.card:hover{border-color:var(--bd2);box-shadow:var(--shd);transform:translateY(-1px)}
.card.ehipas-card{border-color:var(--fbrd)!important;background:var(--fbg)}
.card[data-cat="adapt"]{border-left-color:var(--cat-adapt)}
.card[data-cat="exotic"]{border-left-color:var(--cat-exotic)}
.card[data-cat="buddhism"]{border-left-color:var(--cat-buddhism)}
.card[data-cat="culture"]{border-left-color:var(--cat-culture)}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card-hdr{display:flex;align-items:flex-start;gap:7px}
.card-num{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.1em;flex-shrink:0;padding-top:2px}
.card-tit{font-size:13px;font-weight:500;line-height:1.4;flex:1;color:var(--tx)}
.card-rec{color:var(--acc);font-size:11px;margin-left:3px;flex-shrink:0}
.card-cat{display:inline-flex;padding:2px 6px;border-radius:3px;font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;width:fit-content}
.card[data-cat="adapt"] .card-cat{background:rgba(247,183,74,.12);color:var(--cat-adapt)}
.card[data-cat="exotic"] .card-cat{background:rgba(247,74,74,.12);color:var(--cat-exotic)}
.card[data-cat="buddhism"] .card-cat{background:rgba(155,126,247,.12);color:var(--cat-buddhism)}
.card[data-cat="culture"] .card-cat{background:rgba(74,247,201,.12);color:var(--cat-culture)}
.card-desc{font-size:12px;color:var(--tx2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:1px}
.tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--tx3);border:1px solid var(--bd);white-space:nowrap}
.tag.diff{border:none}
.tag.diff-low{background:rgba(74,247,201,.1);color:var(--diff-low)}
.tag.diff-med{background:rgba(247,183,74,.1);color:var(--diff-med)}
.tag.diff-high{background:rgba(247,74,74,.1);color:var(--diff-high)}
.card-bot{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid var(--bd);margin-top:auto;gap:6px}
.card-cr{font-size:10px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.card-sc{font-family:var(--mono);font-size:9px;color:var(--tx3);flex-shrink:0;white-space:nowrap;max-width:88px;overflow:hidden;text-overflow:ellipsis}
.card-tk{display:flex;align-items:center;gap:2px;font-family:var(--mono);font-size:9px;color:var(--tx3);flex-shrink:0}

/* TEASER CARD */
.teaser{background:var(--acc-dim);border:1px dashed var(--acc-brd);border-radius:var(--r);border-left:3px solid var(--acc);padding:22px 18px;display:flex;flex-direction:column;justify-content:center;gap:10px;animation:fi .22s ease both}
.teaser-n{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--acc);letter-spacing:-.02em}
.teaser-t{font-size:14px;font-weight:400;color:var(--tx);line-height:1.5}
.teaser-s{font-size:11px;color:var(--tx2);line-height:1.65}
.teaser-dots{display:flex;gap:5px;margin-top:4px}
.teaser-dot{width:5px;height:5px;border-radius:50%;background:var(--acc)}
.teaser-dot:nth-child(1){opacity:.4}
.teaser-dot:nth-child(2){opacity:.22}
.teaser-dot:nth-child(3){opacity:.1}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.45);animation:mi .18s ease}
@keyframes mi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.m-hdr{padding:14px 16px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px}
.m-num{font-family:var(--mono);font-size:10px;color:var(--tx3);padding-top:3px;flex-shrink:0}
.m-tit{font-size:15px;font-weight:400;flex:1;line-height:1.4}
.m-cls{flex-shrink:0;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:17px;padding:0 0 0 8px;transition:color .15s;line-height:1}
.m-cls:hover{color:var(--tx)}
.m-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--bd);background:var(--bg3)}
.m-nb{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);font-family:var(--mono);font-size:10px;color:var(--tx2);cursor:pointer;transition:border-color .15s,color .15s;letter-spacing:.04em}
.m-nb:hover:not(:disabled){border-color:var(--bd2);color:var(--tx)}
.m-nb:disabled{opacity:.3;cursor:not-allowed}
.m-pos{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.m-body{padding:16px}
.m-cr{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.m-cat{display:inline-flex;padding:3px 8px;border-radius:3px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.m-rec-bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:3px;font-family:var(--mono);font-size:9px;background:var(--fbg);color:var(--acc);border:1px solid var(--fbrd)}
.mrow{margin-bottom:13px}
.mrow-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.mrow-v{font-size:12px;color:var(--tx2);line-height:1.65}
.mrow-v.prob{font-style:italic;padding:8px 10px;background:var(--bg3);border-radius:var(--rs);border-left:2px solid var(--bd2)}
.m-mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px 0;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);margin-bottom:13px}
@media(max-width:400px){.m-mg{grid-template-columns:1fr 1fr}}
.m-ml{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:3px}
.m-mv{font-family:var(--mono);font-size:12px;color:var(--tx)}
.srow{display:flex;flex-wrap:wrap;gap:4px}
</style>
</head>

<body data-theme="dark">
<div class="overlay" id="ov" onclick="closeDD()"></div>

<!-- HEADER -->
<div class="hdr">
  <span class="logo">ehipas</span>
  <span class="hdr-title" id="htl">Витрина впечатлений</span>
  <div class="sw">
    <span class="si">⌕</span>
    <input type="text" id="qi" placeholder="Поиск впечатлений…" oninput="applyFilters()">
  </div>
  <div class="hdr-ctrls">

    <!-- LANG -->
    <div class="ddwrap">
      <button class="ddtrig" onclick="togDD('lang')">
        <span id="ll">RU</span><span class="ddarrow">▾</span>
      </button>
      <div class="ddmenu" id="lang-dd">
        <div class="ddi" id="ld-en" onclick="setLang('en')">
          <span class="ddi-ic">🇬🇧</span><span class="ddi-lb">English</span><span class="ddi-ck" id="lc-en"></span>
        </div>
        <div class="ddi" id="ld-th" onclick="setLang('th')">
          <span class="ddi-ic">🇹🇭</span><span class="ddi-lb">ภาษาไทย</span><span class="ddi-ck" id="lc-th"></span>
        </div>
        <div class="ddi" id="ld-zh" onclick="setLang('zh')">
          <span class="ddi-ic">🇨🇳</span><span class="ddi-lb">中文</span><span class="ddi-ck" id="lc-zh"></span>
        </div>
        <div class="ddi" id="ld-ru" onclick="setLang('ru')">
          <span class="ddi-ic">🇷🇺</span><span class="ddi-lb">Русский</span><span class="ddi-ck" id="lc-ru"></span>
        </div>
      </div>
    </div>

    <!-- THEME -->
    <div class="ddwrap">
      <button class="ddtrig" onclick="togDD('theme')">
        <span id="tic">☾</span><span class="ddarrow">▾</span>
      </button>
      <div class="ddmenu" id="theme-dd">
        <div class="ddi on" id="td-system" onclick="setTheme('system')">
          <span class="ddi-ic">⊙</span><span class="ddi-lb" data-i="th_sys">Системная</span><span class="ddi-ck" id="tc-system">✓</span>
        </div>
        <div class="ddi" id="td-light" onclick="setTheme('light')">
          <span class="ddi-ic">☀</span><span class="ddi-lb" data-i="th_light">Светлая</span><span class="ddi-ck" id="tc-light"></span>
        </div>
        <div class="ddi" id="td-dark" onclick="setTheme('dark')">
          <span class="ddi-ic">☾</span><span class="ddi-lb" data-i="th_dark">Тёмная</span><span class="ddi-ck" id="tc-dark"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- LAYOUT -->
<div class="wrap">

  <!-- SIDEBAR -->
  <aside class="sb">

    <div class="ssec">
      <div class="cbadge">
        <span class="cnum" id="cnum">49</span>&nbsp;<span id="clbl">впечатлений</span>
      </div>
    </div>

    <div class="ssec">
      <div class="slbl" data-i="sb_cats">Категории</div>
      <div class="fchips">
        <div class="fc active" data-cat="all" onclick="setCat('all')">
          <span class="fdot" style="background:var(--bd2)"></span>
          <span class="fl" data-i="cat_all">Все</span>
          <span class="fn" id="cnt-all">49</span>
        </div>
        <div class="fc" data-cat="adapt" onclick="setCat('adapt')">
          <span class="fdot" style="background:var(--cat-adapt)"></span>
          <span class="fl" data-i="cat_adapt">Адаптация фарангов</span>
          <span class="fn" id="cnt-adapt"></span>
        </div>
        <div class="fc" data-cat="exotic" onclick="setCat('exotic')">
          <span class="fdot" style="background:var(--cat-exotic)"></span>
          <span class="fl" data-i="cat_exotic">Экзотика</span>
          <span class="fn" id="cnt-exotic"></span>
        </div>
        <div class="fc" data-cat="buddhism" onclick="setCat('buddhism')">
          <span class="fdot" style="background:var(--cat-buddhism)"></span>
          <span class="fl" data-i="cat_buddhism">Буддизм</span>
          <span class="fn" id="cnt-buddhism"></span>
        </div>
        <div class="fc" data-cat="culture" onclick="setCat('culture')">
          <span class="fdot" style="background:var(--cat-culture)"></span>
          <span class="fl" data-i="cat_culture">Культура</span>
          <span class="fn" id="cnt-culture"></span>
        </div>
      </div>
    </div>

    <div class="ssec">
      <div class="slbl" data-i="sb_diff">Сложность</div>
      <div class="dchips">
        <div class="dc" data-diff="low" onclick="togDiff('low')">
          <span class="fdot" style="background:var(--diff-low)"></span>
          <span class="fl" data-i="diff_low">Низкая</span>
          <span class="fn" id="cnt-dl"></span>
        </div>
        <div class="dc" data-diff="med" onclick="togDiff('med')">
          <span class="fdot" style="background:var(--diff-med)"></span>
          <span class="fl" data-i="diff_med">Средняя</span>
          <span class="fn" id="cnt-dm"></span>
        </div>
        <div class="dc" data-diff="high" onclick="togDiff('high')">
          <span class="fdot" style="background:var(--diff-high)"></span>
          <span class="fl" data-i="diff_high">Высокая</span>
          <span class="fn" id="cnt-dh"></span>
        </div>
      </div>
    </div>

    <div class="ssec">
      <div class="slbl" data-i="sb_rec">Ehipas рекомендует</div>
      <div class="ftog" id="ftog" onclick="togRec()">
        <span class="star">★</span>
        <span class="fl" data-i="rec_lbl">Ehipas рекомендует</span>
        <span class="fn" id="cnt-r"></span>
      </div>
    </div>

    <button class="rbtn" onclick="resetFilters()" data-i="reset_btn">↺ сбросить фильтры</button>

  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="nores" id="nores">
      <div class="nores-ic">∅</div>
      <div id="norlbl">Ничего не найдено</div>
    </div>
    <div class="grid" id="grid"></div>
  </main>

</div>

<!-- MODAL -->
<div class="mo" id="mo" onclick="moOverlayClick(event)">
  <div class="modal" id="modal">

    <div class="m-hdr">
      <span class="m-num" id="m-num"></span>
      <span class="m-tit" id="m-tit"></span>
      <button class="m-cls" onclick="closeMo()">✕</button>
    </div>

    <div class="m-nav">
      <button class="m-nb" id="m-prev" onclick="navMo(-1)">
        ← <span data-i="nav_prev">Назад</span>
      </button>
